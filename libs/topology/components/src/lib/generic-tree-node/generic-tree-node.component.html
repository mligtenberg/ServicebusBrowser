<p-context-menu
  #contextMenu
  [model]="contextMenuItems()"
  appendTo="body"
/>

<div class="line-container" (contextmenu)="showContextMenu() ? contextMenu.toggle($event) : undefined">
  <span class="name" [pTooltip]="node().name" tooltipPosition="bottom">
    @if (node().icon; as icon) {
      <fa-icon [icon]="icon"></fa-icon>
    }
    {{ node().name }}
  </span>
  @if (showMessageCounts()) {
    <span [pTooltip]="messageCountToolTip">{{messageCountSummary()}}</span>
    <ng-template #messageCountToolTip>
      <div class="message-count-tooltip">
        @for (messageCount of messageCountEntities(); track $index) {
          <div>
            {{messageCount[0]}}: {{messageCount[1]}}
          </div>
        }
      </div>
    </ng-template>
  }

  @if (showRefresh()) {
    <div class="refresh-button">
      <p-button
        [severity]="hasError() ? 'danger' : 'primary'"
        icon="pi pi-refresh"
        [rounded]="true"
        [text]="true"
        (click)="refresh()"
        [ngClass]="{ 'spin': isLoading() }"
        [disabled]="isLoading()"
      />
    </div>
  }
</div>
