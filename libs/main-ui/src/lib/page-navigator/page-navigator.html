<div class="navigator"
     cdkDropList
     cdkDropListOrientation="horizontal"
     (cdkDropListDropped)="drop($event)"
     (scroll)="onElementChange()"
     #pageNavigator
>
  @for (page of pages(); track page.id; let i = $index) {
    <div
      class="page"
      cdkDrag
      [cdkDragDisabled]="page.blocked || editingPageId() === page.id"
      [cdkDragData]="page.id"
      [ngClass]="{'active': page === currentPage(), disabled: page.blocked }"
      (dblclick)="!page.blocked && startRename(page.id, page.name)"
    >
      @if (page.blocked) {
        <span
          [attr.aria-label]="page.name">{{ page.name }}</span>
        <button tabindex="1" disabled class="close-button">
          <span class="pi pi-times"></span>
        </button>
      }
      @else {
        @if (editingPageId() === page.id) {
          <input
            class="page-name-input"
            [attr.data-page-rename-input]="page.id"
            [ngModel]="editingPageName()"
            (ngModelChange)="updateEditingPageName($event)"
            (click)="$event.stopPropagation()"
            (dblclick)="$event.stopPropagation()"
            (blur)="cancelRename()"
            (keydown.enter)="commitRename(page.id)"
            (keydown.escape)="cancelRename()"
            tabindex="1"
          />
          <button
            tabindex="1"
            class="rename-action-button accept-button"
            (mousedown)="$event.preventDefault()"
            (click)="commitRename(page.id); $event.stopPropagation()"
            aria-label="Confirm rename"
          >
            <span class="pi pi-check"></span>
          </button>
          <button
            tabindex="1"
            class="rename-action-button cancel-button"
            (mousedown)="$event.preventDefault()"
            (click)="cancelRename(); $event.stopPropagation()"
            aria-label="Cancel rename"
          >
            <span class="pi pi-times"></span>
          </button>
        }
        @else {
          <span
            [routerLink]="page.route"
            tabindex="1"
            [attr.aria-label]="page.name">{{ page.name }}</span>
          <button tabindex="1" (click)="closePage(page.id, $event, i)" class="close-button">
            <span class="pi pi-times"></span>
          </button>
        }
      }
    </div>
  }
</div>

<div class="navigator-border"></div>

@if (!scrollAtStart()) {
  <button
    class="move-scroll-button move-left"
    (click)="scrollToStart(pageNavigator)"
  ><span
    class="pi pi-chevron-left"></span></button>
}

@if (!scrollAtEnd()) {
  <button
    class="move-scroll-button move-right"
    (click)="scrollToEnd(pageNavigator)"
  ><span
    class="pi pi-chevron-right"></span></button>
}
